<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pieceful - Goals</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* Card styling */
.card {
  background: white;
  margin: 16px auto;
  padding: 18px;
  border-radius: 18px;
  width: 90%;
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
  text-align: left;
}

.card h2 {
  color: #ff8fab;
  margin-bottom: 10px;
}

/* Goal header */
.goal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.category {
  font-size: 12px;
  background: #ffe5ec;
  padding: 4px 8px;
  border-radius: 8px;
}

/* Task row */
.task {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
}

.task label {
  display: flex;
  align-items: center;
  gap: 8px;
}

.task:hover {
  background-color: #f9f9f9;
  border-radius: 6px;
  padding-left: 4px;
}

.task span {
  font-size: 14px;
  color: #555;
}

/* Subtask input */
.subtask-input {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.subtask-input input {
  flex: 1;
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

/* Progress bar */
.progress-bar {
  width: 100%;
  height: 15px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.progress {
  height: 100%;
  background: #ff8fab;
  width: 0%;
}

/* Button */
.btn {
  background-color: #80ed99;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 6px;
  font-size: 14px;
  transition: 0.2s;
}

.btn:hover {
  background-color: #57cc99;
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="phone">

  <!-- Header -->
  <div class="top-header">
  <div class="left-group">
    <img src="App LOGO (90x90).png" class="logo" alt="Logo">
    <span class="page-title">Exercise</span>
  </div>
  <div class="right-group">
    <a href="index.html" class="nav-btn">🏠</a>
    <a href="settings.html" class="nav-btn">⚙️</a>
  </div>
</div>

  <!-- Content -->
  <div class="content">

    <!-- New Goal -->
    <div class="card">
      <h2>New Goal</h2>
      <input id="goalTitle" placeholder="What do you want to achieve?" />
      <select id="category">
        <option>Academic</option>
        <option>Short Term</option>
        <option>Long Term</option>
        <option>Personal</option>
        <option>Weekly</option>
      </select>
      <button class="btn" onclick="addGoal()">+ Add Goal</button>
    </div>

    <!-- Goals container -->
    <div id="goalsContainer"></div>

    <!-- Overall progress --> 
    <div class="card">
      <h2>📊 Progress</h2>
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>
      <p class="progress-text" id="progressText">0% complete</p>
    </div>

  </div>

  <!-- Bottom menu -->
  <div class="menu">
    <a href="exercise.html">🏃 Exercise</a>
    <a href="nutrition.html">🍽 Nutrition</a>
    <a href="goals.html">📊 Goals</a>
    <a href="history.html">📅 History</a>
  </div>

</div>

<script src="goals.js"></script>
</body>
</html>
