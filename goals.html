<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pieceful - Goals</title>

<link rel="stylesheet" href="styles.css">

<style>
/* Extra styling just for goals */

.goal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.category {
  font-size: 12px;
  background: #ffe5ec;
  padding: 4px 8px;
  border-radius: 8px;
}

.subtask-input {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.subtask-input input {
  flex: 1;
}

.progress-text {
  margin-top: 5px;
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <div>9:41</div>
    <div>🔋</div>
  </div>

  <!-- Header -->
  <div class="top-header">
    <p>🎯 Goals</p>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Add Goal -->
    <div class="card">
      <h2>New Goal</h2>

      <input id="goalTitle" placeholder="What do you want to achieve?" />

      <select id="category">
        <option>Academic</option>
        <option>Short Term</option>
        <option>Long Term</option>
        <option>Personal</option>
        <option>Weekly</option>
      </select>

      <button class="btn" onclick="addGoal()">+ Add Goal</button>
    </div>

    <!-- Goals List -->
    <div id="goalsContainer"></div>

    <!-- Progress -->
    <div class="card">
      <h2>📊 Progress</h2>

      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <p class="progress-text" id="progressText">0% complete</p>
    </div>

  </div>

  <!-- Menu -->
  <div class="menu">
    <a href="index.html">Home 🏠</a>
    <a href="health.html">Health ❤️</a>
    <a href="goals.html">Goals 📊</a>
    <a href="history.html">History 📅</a>
  </div>

</div>

<script src="goals.js"></script>

</body>
</html>
