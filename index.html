<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pieceful</title>

  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="phone">

    <!-- Header -->
    <div class="top-header">

    <div class="left-group">
      <img src="App LOGO (90x90).png" class="logo" alt="Logo">
      <span class="page-title">Pieceful</span>
    </div>

    <div class="right-group">
      <a href="index.html" class="nav-btn">🏠</a>
      <a href="settings.html" class="nav-btn">⚙️</a>
    </div>
</div>

    <!-- Content -->
    <div class="content">

      <h1 id="greeting">Welcome 💗</h1>

      <!-- <p>
        Take a moment for yourself. Breathe, reset, and remind yourself of your strength.
      </p> -->

      <!-- Affirmation -->
      <div class="card">
        <h2>🌸 Daily Affirmation</h2>
        <p id="affirmation">You are enough 💖</p>
        <button class="btn" onclick="newAffirmation()">✨ New Affirmation</button>
      </div>

      <!-- Mood -->
      <div class="card">
        <h2>💭 How are you feeling?</h2>
        <button class="btn" onclick="setMood('😊')">😊</button>
        <button class="btn" onclick="setMood('😐')">😐</button>
        <button class="btn" onclick="setMood('😔')">😔</button>
        <p id="moodText"></p>
      </div>

      <!-- Daily Win -->
      <div class="card">
        <h2>🏆 Daily Win</h2>
        <input id="winInput" placeholder="Something good today"/>
        <button class="btn" onclick="saveWin()">Save</button>
        <p id="winText"></p>
      </div>

    </div>

    <!-- Menu -->
    <div class="menu">
      <a href="exercise.html">🏃 Exercise</a>
      <a href="nutrition.html">🍽 Nutrition</a>
      <a href="goals.html">📊 Goals</a>
      <a href="history.html">📅 History</a>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
