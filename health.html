<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pieceful - Health</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="phone">

    <!-- Status Bar -->
    <div class="status-bar">
      <div>9:41</div>
      <div>🔋</div>
    </div>

    <!-- Header -->
    <div class="top-header">
      <p>❤️ Health</p>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Exercise -->
      <div class="card">
        <h2>🏃 Exercise</h2>
        <input id="exerciseInput" type="number" placeholder="Minutes" />
        <button class="btn" onclick="addExercise()">Add</button>
        <p>Total Today: <span id="exerciseCount">0</span> / 30</p>
      </div>

      <!-- Hydration -->
      <div class="card">
        <h2>💧 Hydration</h2>
        <button class="btn" onclick="addWater()">+1 Glass</button>
        <p>Today: <span id="waterCount">0</span> / 8</p>
      </div>

      <!-- Streaks -->
      <div class="card">
        <h2>🔥 Streaks</h2>
        <p>Hydration: <span id="hydrationStreak">0</span> days</p>
        <p>Exercise: <span id="exerciseStreak">0</span> days</p>
      </div>

    </div>

    <!-- Menu -->
    <div class="menu">
      <a href="index.html">Home 🏠</a>
      <a href="health.html">Health ❤️</a>
      <a href="goals.html">Goals 📊</a>
      <a href="history.html">History 📅</a>
    </div>

  </div>

  <script src="health.js"></script>

</body>
</html>
